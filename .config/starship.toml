# ~/.config/starship.toml

# I added a space at the end of the format string for breathing room
format = "$username$directory$git_branch$git_status$container $character"

[username]
show_always = true
# using 'blue' maps to your terminal's specific blue definition
style_user = "bold blue" 
format = "[$user]($style)"

[directory]
# 'cyan' usually contrasts well with blue usernames
style = "bold cyan"
format = " in [$path]($style)"

[git_branch]
# 'purple' (or magenta) is standard for git to separate it from the path
style = "bold purple"
format = "[ on $branch]($style)"

[git_status]
# 'red' ensures you see when files are modified
style = "bold red"
modified = '($count modified)'
format = " [$modified]($style)"

[container]
symbol = " 📦"
style = "bold yellow"
format = "[$symbol$name]($style)"

[character]
# Fixed the broken syntax below
success_symbol = "[λ](bold green)"
error_symbol = "[λ](bold red)"
# Adds a visual indicator if you use Vim mode in your shell
vicmd_symbol = "[λ](bold yellow)"
